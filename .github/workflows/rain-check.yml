name: Comprobador de lluvia (push)

# Revisa el radar por la zona de cada suscriptor y envía avisos push por
# OneSignal cuando llueve o se acerca lluvia. Corre en segundo plano; los
# usuarios reciben el aviso aunque tengan la app cerrada.
on:
  schedule:
    # Cada 10 min, desplazado de la hora en punto (:03, :13, :23...). GitHub
    # descarta muchas ejecuciones en el minuto :00 (hora punta de su cron);
    # evitarlo mejora la fiabilidad. Aun así, GitHub no garantiza el minuto
    # exacto. Coincide con el ritmo de RainViewer (~10 min).
    - cron: "7,17,27,37,47,57 * * * *"
  workflow_dispatch: {} # permite lanzarlo a mano desde la pestaña Actions

# Evita que dos ejecuciones se solapen.
concurrency:
  group: rain-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # El estado anti-repetición (checker/state.json) se guarda entre
      # ejecuciones en la CACHÉ de Actions, no commiteando al repo: así se evitan
      # por completo las carreras de git push. restore-keys "rain-state-" trae la
      # caché más reciente; luego se guarda una nueva con clave única por run.
      - name: Restaurar estado de avisos
        uses: actions/cache/restore@v4
        with:
          path: checker/state.json
          key: rain-state-${{ github.run_id }}
          restore-keys: |
            rain-state-

      - name: Comprobar y enviar avisos
        run: npx tsx checker/index.ts
        env:
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
          ONESIGNAL_REST_API_KEY: ${{ secrets.ONESIGNAL_REST_API_KEY }}

      - name: Guardar estado de avisos
        if: always()
        uses: actions/cache/save@v4
        with:
          path: checker/state.json
          key: rain-state-${{ github.run_id }}
